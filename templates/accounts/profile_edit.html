{% extends "base.html" %}

{% block title %}Edit Profile — SlideAI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4">Edit Profile</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_bio" class="form-label">Bio</label>
                <textarea name="bio" id="id_bio" class="form-control" rows="4">{{ form.bio.value|default:"" }}</textarea>
            </div>
            <div class="mb-3">
                <label for="id_avatar_url" class="form-label">Avatar URL</label>
                <input type="url" name="avatar_url" id="id_avatar_url" class="form-control" value="{{ form.avatar_url.value|default:"" }}">
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
