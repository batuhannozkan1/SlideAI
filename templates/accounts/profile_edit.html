{% extends "layouts/app.html" %}

{% block title %}Profili Düzenle — SlideAI{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <h2 class="text-2xl font-semibold text-on-surface mb-6">Profili Düzenle</h2>

    <div class="bg-white rounded-xl border border-outline-variant p-6 shadow-sm">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="id_bio" class="block text-sm font-medium text-on-surface mb-1">Bio</label>
                <textarea name="bio" id="id_bio" rows="4"
                          class="w-full px-3 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">{{ form.bio.value|default:"" }}</textarea>
            </div>
            <div>
                <label for="id_avatar_url" class="block text-sm font-medium text-on-surface mb-1">Avatar URL</label>
                <input type="url" name="avatar_url" id="id_avatar_url"
                       value="{{ form.avatar_url.value|default:"" }}"
                       class="w-full px-3 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="px-4 py-2 bg-[#eff6ff] text-[#2563eb] border border-[#bfdbfe] font-medium rounded-xl hover:bg-[#dbeafe] transition-colors text-sm">
                    Kaydet
                </button>
                <a href="{% url 'accounts:profile' %}" class="px-4 py-2 border border-outline-variant text-on-surface rounded-xl hover:bg-surface-container-low transition-colors text-sm font-medium">
                    İptal
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
