{% extends "layouts/app.html" %}

{% block title %}Yeni Sunum — SlideAI{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <h2 class="text-2xl font-semibold text-on-surface mb-6">Yeni Sunum</h2>

    <div class="bg-white rounded-xl border border-outline-variant p-6 shadow-sm">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="id_title" class="block text-sm font-medium text-on-surface mb-1">Başlık</label>
                <input type="text" name="title" id="id_title" required maxlength="255" autofocus
                       class="w-full px-3 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
            </div>
            <div>
                <label for="id_description" class="block text-sm font-medium text-on-surface mb-1">Açıklama</label>
                <textarea name="description" id="id_description" rows="3"
                          class="w-full px-3 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"></textarea>
            </div>
            <div>
                <label for="id_theme" class="block text-sm font-medium text-on-surface mb-1">Tema</label>
                <select name="theme" id="id_theme"
                        class="w-full px-3 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-white">
                    <option value="">Tema seçin...</option>
                    {% for theme in form.theme.field.queryset %}
                    <option value="{{ theme.pk }}">{{ theme.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="px-4 py-2 bg-primary text-white font-medium rounded-xl hover:bg-primary-container transition-colors text-sm">
                    Oluştur
                </button>
                <a href="{% url 'presentations:list' %}" class="px-4 py-2 border border-outline-variant text-on-surface rounded-xl hover:bg-surface-container-low transition-colors text-sm font-medium">
                    İptal
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
