{% extends "base.html" %}

{% block title %}Yeni Sunum — SlideAI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4">Yeni Sunum</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_title" class="form-label">Başlık</label>
                <input type="text" name="title" id="id_title" class="form-control" required maxlength="255">
            </div>
            <div class="mb-3">
                <label for="id_description" class="form-label">Açıklama</label>
                <textarea name="description" id="id_description" class="form-control" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label for="id_theme" class="form-label">Tema</label>
                <select name="theme" id="id_theme" class="form-select">
                    <option value="">Tema seçin...</option>
                    {% for theme in form.theme.field.queryset %}
                    <option value="{{ theme.pk }}">
                        {{ theme.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Oluştur</button>
            <a href="{% url 'presentations:list' %}" class="btn btn-outline-secondary">İptal</a>
        </form>
    </div>
</div>
{% endblock %}
