{% extends "layouts/app.html" %}

{% block title %}Düzenle: {{ presentation.title }} — SlideAI{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <h2 class="text-2xl font-semibold text-on-surface mb-6">Sunumu Düzenle</h2>

    <div class="bg-white rounded-xl border border-outline-variant p-6 shadow-sm">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="id_title" class="block text-sm font-medium text-on-surface mb-1">Başlık</label>
                <input type="text" name="title" id="id_title" value="{{ form.title.value|default:'' }}"
                       class="w-full px-3 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
            </div>
            <div>
                <label for="id_description" class="block text-sm font-medium text-on-surface mb-1">Açıklama</label>
                <textarea name="description" id="id_description" rows="3"
                          class="w-full px-3 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">{{ form.description.value|default:'' }}</textarea>
            </div>
            <div>
                <label for="id_theme" class="block text-sm font-medium text-on-surface mb-1">Tema</label>
                <select name="theme" id="id_theme"
                        class="w-full px-3 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-white">
                    <option value="">Tema seçin...</option>
                    {% for theme in form.theme.field.queryset %}
                    <option value="{{ theme.pk }}" {% if form.theme.value|stringformat:"s" == theme.pk|stringformat:"s" %}selected{% endif %}>
                        {{ theme.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" name="is_public" id="id_is_public"
                       {% if form.is_public.value %}checked{% endif %}
                       class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary">
                <label for="id_is_public" class="text-sm text-on-surface">Herkese açık</label>
            </div>
            <div class="flex items-center justify-between pt-2">
                <div class="flex gap-3">
                    <button type="submit" class="px-4 py-2 bg-[#eff6ff] text-[#2563eb] border border-[#bfdbfe] font-medium rounded-xl hover:bg-[#dbeafe] transition-colors text-sm">
                        Kaydet
                    </button>
                    <a href="{% url 'presentations:detail' pk=presentation.pk %}" class="px-4 py-2 border border-outline-variant text-on-surface rounded-xl hover:bg-surface-container-low transition-colors text-sm font-medium">
                        İptal
                    </a>
                </div>
                <a href="{% url 'presentations:delete' pk=presentation.pk %}" class="px-4 py-2 text-error hover:bg-error-container rounded-xl transition-colors text-sm font-medium">
                    Sil
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
