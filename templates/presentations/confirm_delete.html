{% extends "base.html" %}

{% block title %}Delete {{ presentation.title }} — SlideAI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Delete Presentation</h2>
        <div class="alert alert-danger">
            <p>Are you sure you want to delete <strong>{{ presentation.title }}</strong>?</p>
            <p class="mb-0">This action cannot be undone.</p>
        </div>
        <form method="post" action="{% url 'presentations:delete' pk=presentation.pk %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'presentations:detail' pk=presentation.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
