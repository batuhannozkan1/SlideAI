<div class="slide-card slide-card--{{ slide.layout }}"
     draggable="true"
     data-slide-id="{{ slide.pk }}"
     style="
        --slide-primary: {{ theme.primary_color|default:'#1a365d' }};
        --slide-secondary: {{ theme.secondary_color|default:'#ffffff' }};
        --slide-accent: {{ theme.accent_color|default:'#3182ce' }};
        --slide-font-heading: '{{ theme.font_heading|default:'Inter' }}', sans-serif;
        --slide-font-body: '{{ theme.font_body|default:'Inter' }}', sans-serif;
     ">
    <div class="slide-card__actions">
        <a href="{% url 'presentations:editor' pk=presentation.pk %}"
           class="btn" title="Düzenle">
            <span class="material-symbols-outlined" style="font-size:14px">edit</span>
        </a>
        <form method="post" action="{% url 'presentations:slide-regenerate' presentation_pk=presentation.pk pk=slide.pk %}"
              style="display:inline" onsubmit="return confirm('Bu slaytı yeniden oluşturmak istediğinize emin misiniz?')">
            {% csrf_token %}
            <button type="submit" class="btn" title="Yeniden Oluştur">
                <span class="material-symbols-outlined" style="font-size:14px">refresh</span>
            </button>
        </form>
        <form method="post" action="{% url 'presentations:slide-delete' presentation_pk=presentation.pk pk=slide.pk %}"
              style="display:inline" onsubmit="return confirm('Bu slaytı silmek istediğinize emin misiniz?')">
            {% csrf_token %}
            <button type="submit" class="btn" title="Sil">
                <span class="material-symbols-outlined" style="font-size:14px">delete</span>
            </button>
        </form>
    </div>
    <div class="slide-card__heading">{{ slide.heading }}</div>
    <div class="slide-card__body">{{ slide.body|truncatewords:30|linebreaksbr }}</div>
    <div class="slide-card__number">{{ forloop.counter }}</div>
</div>
