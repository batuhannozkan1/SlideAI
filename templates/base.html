{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SlideAI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#3b82f6",
                    "primary-container": "#2563eb",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#fffbff",
                    "secondary": "#565e74",
                    "secondary-container": "#dae2fd",
                    "on-secondary": "#ffffff",
                    "on-secondary-container": "#5c647a",
                    "tertiary": "#595c5e",
                    "tertiary-container": "#727577",
                    "tertiary-fixed": "#e0e3e5",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-container": "#fbfdff",
                    "on-tertiary-fixed": "#191c1e",
                    "error": "#ba1a1a",
                    "error-container": "#ffdad6",
                    "on-error": "#ffffff",
                    "on-error-container": "#93000a",
                    "surface": "#f8f9ff",
                    "surface-dim": "#ccdbf2",
                    "surface-bright": "#f8f9ff",
                    "surface-variant": "#d4e4fa",
                    "surface-tint": "#494bd6",
                    "surface-container": "#e5efff",
                    "surface-container-low": "#eef4ff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#dbe9ff",
                    "surface-container-highest": "#d4e4fa",
                    "on-surface": "#0d1c2d",
                    "on-surface-variant": "#464554",
                    "on-background": "#0d1c2d",
                    "background": "#f8f9ff",
                    "outline": "#767586",
                    "outline-variant": "#c7c4d7",
                    "inverse-surface": "#233143",
                    "inverse-on-surface": "#e9f1ff",
                    "inverse-primary": "#bfdbfe",
                    "primary-fixed": "#dbeafe",
                    "primary-fixed-dim": "#bfdbfe",
                    "on-primary-fixed": "#07006c",
                    "on-primary-fixed-variant": "#2f2ebe",
                    "secondary-fixed": "#dae2fd",
                    "secondary-fixed-dim": "#bec6e0",
                    "on-secondary-fixed": "#131b2e",
                    "on-secondary-fixed-variant": "#3f465c",
                    "tertiary-fixed-dim": "#c4c7c9",
                    "on-tertiary-fixed-variant": "#444749",
                },
                borderRadius: {
                    DEFAULT: "0.5rem",
                    lg: "0.75rem",
                    xl: "1rem",
                    full: "9999px",
                },
                spacing: {
                    "sidebar": "260px",
                    "topbar": "64px",
                    "gutter": "1.5rem",
                    "stack-sm": "0.5rem",
                    "stack-md": "1rem",
                    "stack-lg": "2rem",
                },
                fontSize: {
                    "headline-lg": ["30px", { lineHeight: "38px", letterSpacing: "-0.02em", fontWeight: "600" }],
                    "headline-md": ["24px", { lineHeight: "32px", letterSpacing: "-0.015em", fontWeight: "600" }],
                    "headline-sm": ["18px", { lineHeight: "26px", letterSpacing: "-0.01em", fontWeight: "600" }],
                    "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                    "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
                    "body-sm": ["13px", { lineHeight: "18px", fontWeight: "400" }],
                    "label-md": ["12px", { lineHeight: "16px", letterSpacing: "0.02em", fontWeight: "500" }],
                    "label-sm": ["11px", { lineHeight: "14px", fontWeight: "600" }],
                },
            },
        },
    }
    </script>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    {% block head_css %}{% endblock %}
</head>
<body class="{% block body_class %}bg-surface text-on-background{% endblock %}">
    {% block body %}{% endblock %}
    <script src="{% static 'js/app.js' %}"></script>
    {% block body_js %}{% endblock %}
</body>
</html>
