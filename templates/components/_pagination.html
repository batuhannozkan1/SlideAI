{% if result.total_pages > 1 %}
<nav class="flex items-center justify-center gap-1 mt-8">
    {% if result.has_previous %}
    <a href="?page={{ result.page|add:"-1" }}" class="px-3 py-2 text-sm text-on-surface-variant hover:text-primary hover:bg-surface-container-low rounded-lg transition-colors">
        <span class="material-symbols-outlined text-sm align-middle">chevron_left</span>
    </a>
    {% endif %}

    <span class="px-3 py-2 text-sm font-medium text-on-surface">
        {{ result.page }} / {{ result.total_pages }}
    </span>

    {% if result.has_next %}
    <a href="?page={{ result.page|add:"1" }}" class="px-3 py-2 text-sm text-on-surface-variant hover:text-primary hover:bg-surface-container-low rounded-lg transition-colors">
        <span class="material-symbols-outlined text-sm align-middle">chevron_right</span>
    </a>
    {% endif %}
</nav>
{% endif %}
