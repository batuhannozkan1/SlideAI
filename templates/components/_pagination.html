{% if result.total_pages > 1 %}
<nav>
    <ul class="pagination justify-content-center">
        {% if result.has_previous %}
        <li class="page-item">
            <a class="page-link" href="?page={{ result.page|add:"-1" }}">Previous</a>
        </li>
        {% endif %}

        <li class="page-item active">
            <span class="page-link">Page {{ result.page }} of {{ result.total_pages }}</span>
        </li>

        {% if result.has_next %}
        <li class="page-item">
            <a class="page-link" href="?page={{ result.page|add:"1" }}">Next</a>
        </li>
        {% endif %}
    </ul>
</nav>
{% endif %}
